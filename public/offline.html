<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexFlow — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      font-size: 36px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { color: #9ca3af; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none;
      padding: 14px 32px; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .brand { margin-top: 48px; color: #4b5563; font-size: 14px; }
    .brand strong { color: #6366f1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="brand">
      <strong>NexFlow</strong> Automation
    </div>
  </div>
</body>
</html>
